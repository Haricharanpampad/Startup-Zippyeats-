<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display - Live Sync</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #090d16; 
            color: #f1f5f9; 
            margin: 20px; 
            transition: background-color 0.3s ease;
        }
        
        .nav-bar { 
            background: #111827; 
            padding: 15px 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            max-width: 1200px; 
            margin-left: auto; 
            margin-right: auto; 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid #1e293b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-logo { 
            font-size: 18px; 
            font-weight: 700; 
            color: #ff4757; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            text-decoration: none; 
            letter-spacing: -0.02em;
        }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-link { 
            text-decoration: none; 
            color: #9ca3af; 
            font-weight: 600; 
            font-size: 14px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            padding-bottom: 4px; 
        }
        .nav-link:hover { color: #ff4757; }
        .nav-link.active { 
            color: #ff4757; 
            font-weight: 700; 
            border-bottom: 2px solid #ff4757; 
        }
        
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* Assembly Matrix Card Layout */
        .order-card { 
            background: #111827; 
            padding: 20px; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            border: 1px solid #1e293b;
            border-left: 5px solid #ffa502; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border-color: rgba(255, 165, 2, 0.4);
        }

        /* Pulsing Glow Gradient for Live Fire Cooking Cards */
        .alert-active { 
            background: linear-gradient(135deg, #111827 0%, #1c1116 100%) !important; 
            border-left-color: #ff4757 !important; 
            border-color: rgba(255, 71, 87, 0.3) rgba(255, 71, 87, 0.3) rgba(255, 71, 87, 0.3) #ff4757 !important;
            animation: pulseGlow 2.5s infinite alternate ease-in-out !important; 
        }
        @keyframes pulseGlow { 
            0% { 
                box-shadow: 0 4px 15px rgba(255, 71, 87, 0.15); 
                border-color: rgba(255, 71, 87, 0.2) rgba(255, 71, 87, 0.2) rgba(255, 71, 87, 0.2) #ff4757;
            } 
            100% { 
                box-shadow: 0 4px 30px rgba(255, 71, 87, 0.4); 
                border-color: rgba(255, 71, 87, 0.5) rgba(255, 71, 87, 0.5) rgba(255, 71, 87, 0.5) #ff4757;
                background: linear-gradient(135deg, #111827 0%, #251219 100%) !important;
            } 
        }

        /* High contrast neon quantities styling */
        .neon-qty {
            color: #ff4757;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            padding: 1px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 12px;
        }

        /* Monospace and layout variables */
        .mono-val {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-variant-numeric: tabular-nums;
        }

        /* Partner Management & Panels */
        .auth-banner { 
            background: #111827; 
            border: 1px solid #1e293b;
            border-left: 5px solid #10b981; 
            padding: 15px 20px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 14px; 
            flex-wrap: wrap; 
            gap: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .auth-banner.not-logged-in { border-left-color: #f59e0b; }
        
        .logout-btn { 
            background: #f59e0b; 
            border: none; 
            color: #090d16; 
            padding: 8px 16px; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .logout-btn:hover { 
            background: #d97706; 
            color: white; 
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        
        .login-btn { 
            background: #10b981; 
            border: none; 
            color: #090d16; 
            padding: 8px 16px; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: 700; 
            cursor: pointer; 
            text-decoration: none; 
            display: inline-block; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .login-btn:hover { 
            background: #059669; 
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .management-panel { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 10px; }
        @media (min-width: 768px) {
            .management-panel { grid-template-columns: 1fr 1fr; }
        }

        .panel-card { 
            background: #111827; 
            border: 1px solid #1e293b;
            border-radius: 10px; 
            padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .panel-title { 
            font-size: 16px; 
            font-weight: 700; 
            margin-top: 0; 
            margin-bottom: 15px; 
            border-bottom: 1px solid #1e293b; 
            padding-bottom: 12px; 
            color: #ff4757; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .availability-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .availability-list::-webkit-scrollbar { width: 6px; }
        .availability-list::-webkit-scrollbar-track { background: #090d16; border-radius: 3px; }
        .availability-list::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        .availability-list::-webkit-scrollbar-thumb:hover { background: #ff4757; }

        .item-row { 
            background: #090d16; 
            border: 1px solid #1e293b;
            padding: 12px 15px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .item-row:hover { 
            background: #161f30; 
            border-color: rgba(59, 130, 246, 0.3);
        }
        .item-info { display: flex; flex-direction: column; gap: 2px; }
        .item-name { font-weight: 600; font-size: 14px; color: #ffffff; }
        .item-meta { font-size: 12px; color: #94a3b8; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; }
        .badge-available { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-unavailable { background: rgba(255, 71, 87, 0.15); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.3); }

        .btn-action { 
            background: #ff4757; 
            border: none; 
            color: white; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 11px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-action:hover { 
            background: #e84118; 
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }
        .btn-action.btn-secondary { background: #4b5563; }
        .btn-action.btn-secondary:hover { 
            background: #374151; 
            box-shadow: 0 4px 12px rgba(75, 85, 99, 0.3);
        }

        .add-form { 
            display: flex; 
            gap: 10px; 
            margin-top: 15px; 
            background: #090d16; 
            border: 1px solid #1e293b;
            padding: 12px; 
            border-radius: 8px; 
            flex-wrap: wrap; 
            align-items: center; 
        }
        .form-input { 
            padding: 8px 12px; 
            border-radius: 6px; 
            border: 1px solid #1e293b; 
            font-size: 13px; 
            background: #111827; 
            color: white; 
            flex: 1; 
            min-width: 120px; 
            outline: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-input:focus { 
            border-color: #ff4757; 
            box-shadow: 0 0 0 2px rgba(255, 71, 87, 0.15);
        }
        .form-btn { 
            background: #10b981; 
            color: #090d16; 
            font-weight: 700; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            margin-left: auto; 
        }
        .form-btn:hover { 
            background: #059669; 
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .lock-overlay { 
            text-align: center; 
            padding: 45px 20px; 
            border: 2px dashed #1e293b; 
            border-radius: 8px; 
            margin-top: 10px; 
            background: rgba(17, 24, 39, 0.4); 
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="nav-logo">🚗 Route & Preorder Food Sync</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">🗺️ Route Map</a>
            <a href="restaurant-signup.html" class="nav-link">🏪 Restaurant Sign-up</a>
            <a href="kitchen.html" class="nav-link active">🔥 Kitchen Display</a>
            <a href="simulator.html" class="nav-link">💳 Webhook Simulator</a>
            <a href="restaurant-admin.html" class="nav-link">📈 Operations & ROI</a>
        </div>
    </div>

    <div class="container">
        <!-- AUTH STATUS BANNER -->
        <div id="auth-banner-container"></div>

        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-top: 5px;">
            <h1 style="margin: 0; font-size: 24px; font-weight: 700;">🔥 Kitchen Live Display</h1>
            
            <div id="selector-panel" style="background: #1e222b; padding: 8px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <label for="restaurant-selector" style="font-weight: bold; font-size: 13px; color: #a4b0be;">View Stream:</label>
                <select id="restaurant-selector" style="padding: 6px 10px; border-radius: 6px; border: none; font-size: 13px; background: #2f3542; color: white; font-weight: bold; outline: none; cursor: pointer;">
                    <option value="f82e4f22-3816-4243-9a15-e642b8c2a0c0">Pitstop Highway Diner (Map Default)</option>
                    <option value="1b1df56c-9f3f-4c12-9332-58144aa5b7f2">Kitchen Live Diner</option>
                </select>
            </div>
        </div>

        <!-- LIVE ORDERS SECTION -->
        <div class="panel-card" style="border-left: 5px solid #ff4757;">
            <div class="panel-title" style="border-bottom: none; margin-bottom: 10px; padding-bottom: 0;">
                <span style="display: flex; align-items: center; gap: 8px; color: #ffffff;">🔔 Live Incoming Orders</span>
                <span style="font-size: 11px; font-weight: bold; background: rgba(255,71,87,0.2); color: #ff4757; padding: 3px 10px; border-radius: 12px;" id="order-count-badge">Listening for Signals...</span>
            </div>
            <div id="orders-list"></div>
        </div>

        <!-- PARTNER MANAGEMENT SECTION (RESERVATIONS & MENU) -->
        <div id="management-container"></div>
    </div>

    <script>
        let socket;
        let currentRestaurantId = document.getElementById("restaurant-selector").value;
        let loggedInRestId = localStorage.getItem('rest_id');
        let tablesData = [];
        let menuItemsData = [];
        let activeOrdersCount = 0;

        function updateAuthBanner() {
            const bannerContainer = document.getElementById("auth-banner-container");
            const selector = document.getElementById("restaurant-selector");
            
            if (loggedInRestId) {
                let restName = "Your Partner Kitchen";
                if (loggedInRestId === "f82e4f22-3816-4243-9a15-e642b8c2a0c0") restName = "Pitstop Highway Diner";
                if (loggedInRestId === "1b1df56c-9f3f-4c12-9332-58144aa5b7f2") restName = "Kitchen Live Diner";

                bannerContainer.innerHTML = `
                    <div class="auth-banner">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span style="font-size: 22px;">🏪</span>
                            <div>
                                <strong style="color: #2ed573; font-size: 15px;">Active Partner Session</strong>
                                <div style="font-size: 12px; color: #a4b0be; margin-top: 2px;">Logged in: <strong style="color: white;">${restName}</strong> <code style="background: rgba(255,255,255,0.08); padding: 2px 5px; border-radius: 4px; font-size: 11px;">${loggedInRestId}</code></div>
                            </div>
                        </div>
                        <button class="logout-btn" onclick="logoutPartner()">Log Out Kitchen</button>
                    </div>
                `;

                // Add to selector if dynamic account
                let optionExists = false;
                for (let i = 0; i < selector.options.length; i++) {
                    if (selector.options[i].value === loggedInRestId) {
                        optionExists = true;
                        break;
                    }
                }
                if (!optionExists) {
                    const opt = document.createElement('option');
                    opt.value = loggedInRestId;
                    opt.text = restName;
                    selector.add(opt);
                }

                selector.value = loggedInRestId;
                selector.disabled = true;
                currentRestaurantId = loggedInRestId;
                
                showManagementPanel(true);
            } else {
                bannerContainer.innerHTML = `
                    <div class="auth-banner not-logged-in">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span style="font-size: 22px;">💡</span>
                            <div>
                                <strong style="color: #ffa502; font-size: 15px;">Restaurant Partner Access</strong>
                                <div style="font-size: 12px; color: #a4b0be; margin-top: 2px;">Log in to manage live table capacities, customer seating, and menu availability.</div>
                            </div>
                        </div>
                        <button class="login-btn" onclick="goToLogin()">Partner Login</button>
                    </div>
                `;
                
                selector.disabled = false;
                showManagementPanel(false);
            }
        }

        function goToLogin() {
            window.location.href = 'restaurant-signup.html?action=login';
        }

        function logoutPartner() {
            localStorage.removeItem('rest_id');
            loggedInRestId = null;
            
            const selector = document.getElementById("restaurant-selector");
            selector.disabled = false;
            selector.value = "f82e4f22-3816-4243-9a15-e642b8c2a0c0";
            currentRestaurantId = selector.value;
            
            updateAuthBanner();
            if (typeof io !== 'undefined' && socket) {
                joinRoom(currentRestaurantId);
            }
        }

        function showManagementPanel(isAuthorized) {
            const container = document.getElementById("management-container");
            if (!container) return;

            if (isAuthorized) {
                container.innerHTML = `
                    <div class="management-panel">
                        <!-- PANEL 1: TABLES -->
                        <div class="panel-card">
                            <div class="panel-title">
                                <span>🪑 Table Availability Management</span>
                                <span style="font-size: 11px; font-weight: normal; background: rgba(46,213,115,0.15); color: #2ed573; padding: 2px 8px; border-radius: 10px;">Real-Time</span>
                            </div>
                            
                            <div class="availability-list" id="tables-list">
                                <p style="color: #a4b0be; text-align: center; margin: 20px 0; font-size: 13px;">Loading tables...</p>
                            </div>

                            <form class="add-form" onsubmit="addTable(event)">
                                <strong style="width: 100%; display: block; margin-bottom: 5px; font-size: 12px; color: #a4b0be;">Add Dining Table:</strong>
                                <input type="text" id="new-table-number" class="form-input" placeholder="e.g., Table 4" required>
                                <input type="number" id="new-table-capacity" class="form-input" placeholder="Seating" min="1" value="4" required style="max-width: 90px;">
                                <button type="submit" class="form-btn">Add Table</button>
                            </form>
                        </div>

                        <!-- PANEL 2: FOOD ITEMS -->
                        <div class="panel-card">
                            <div class="panel-title">
                                <span>🍳 Food Availability & Inventory</span>
                                <span style="font-size: 11px; font-weight: normal; background: rgba(46,213,115,0.15); color: #2ed573; padding: 2px 8px; border-radius: 10px;">Active Menu</span>
                            </div>
                            
                            <div class="availability-list" id="menu-list">
                                <p style="color: #a4b0be; text-align: center; margin: 20px 0; font-size: 13px;">Loading menu...</p>
                            </div>

                            <form class="add-form" onsubmit="addMenuItem(event)">
                                <strong style="width: 100%; display: block; margin-bottom: 5px; font-size: 12px; color: #a4b0be;">Add Menu Item:</strong>
                                <input type="text" id="new-item-name" class="form-input" placeholder="e.g., Highway Burger" required>
                                <input type="number" id="new-item-price" class="form-input" placeholder="Price ($)" step="0.01" min="0" required style="max-width: 90px;">
                                <button type="submit" class="form-btn">Add Item</button>
                            </form>
                        </div>
                    </div>
                `;
                fetchTables(currentRestaurantId);
                fetchMenuItems(currentRestaurantId);
            } else {
                container.innerHTML = `
                    <div class="lock-overlay">
                        <span style="font-size: 36px; display: block; margin-bottom: 12px;">🔒</span>
                        <h3 style="margin-top: 0; color: #ffa502; font-size: 16px;">Kitchen Seating & Food Panel Locked</h3>
                        <p style="color: #a4b0be; max-width: 580px; margin: 0 auto 20px auto; font-size: 13px; line-height: 1.6;">
                            To manage live table occupancy levels, customize available seating, and toggle stock of menu dishes in real-time, please log in with your restaurant partner credentials.
                        </p>
                        <button class="login-btn" style="padding: 8px 20px; font-size: 13px;" onclick="goToLogin()">Log In to Unlock Dashboard</button>
                    </div>
                `;
            }
        }

        async function fetchTables(restaurantId) {
            try {
                const response = await fetch(`/api/restaurants/${restaurantId}/tables`);
                if (response.ok) {
                    tablesData = await response.json();
                    renderTables();
                }
            } catch (err) {
                console.error("Error fetching tables:", err);
            }
        }

        async function fetchMenuItems(restaurantId) {
            try {
                const response = await fetch(`/api/restaurants/${restaurantId}/menu`);
                if (response.ok) {
                    menuItemsData = await response.json();
                    renderMenuItems();
                }
            } catch (err) {
                console.error("Error fetching menu items:", err);
            }
        }

        function renderTables() {
            const listElement = document.getElementById("tables-list");
            if (!listElement) return;

            if (tablesData.length === 0) {
                listElement.innerHTML = `<p style="color: #a4b0be; text-align: center; margin: 25px 0; font-size: 13px;">No seating tables configured yet.</p>`;
                return;
            }

            listElement.innerHTML = tablesData.map(table => {
                const badgeClass = table.is_available ? 'badge-available' : 'badge-unavailable';
                const statusText = table.is_available ? 'Available' : 'Occupied';
                const actionText = table.is_available ? 'Set Occupied' : 'Set Available';
                const actionClass = table.is_available ? 'btn-secondary' : '';
                return `
                    <div class="item-row">
                        <div class="item-info">
                            <span class="item-name">${escapeHtml(table.table_number)}</span>
                            <span class="item-meta">Seating Capacity: ${table.capacity} guests</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="badge ${badgeClass}">${statusText}</span>
                            <button class="btn-action ${actionClass}" onclick="toggleTableAvailability('${table.id}', ${!table.is_available})">${actionText}</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderMenuItems() {
            const listElement = document.getElementById("menu-list");
            if (!listElement) return;

            if (menuItemsData.length === 0) {
                listElement.innerHTML = `<p style="color: #a4b0be; text-align: center; margin: 25px 0; font-size: 13px;">No food menu items set up.</p>`;
                return;
            }

            listElement.innerHTML = menuItemsData.map(item => {
                const badgeClass = item.is_available !== false ? 'badge-available' : 'badge-unavailable';
                const statusText = item.is_available !== false ? 'In Stock' : 'Out of Stock';
                const actionText = item.is_available !== false ? 'Set Out of Stock' : 'Set In Stock';
                const actionClass = item.is_available !== false ? 'btn-secondary' : '';
                return `
                    <div class="item-row">
                        <div class="item-info">
                            <span class="item-name">${escapeHtml(item.name)}</span>
                            <span class="item-meta">Active Price: $${parseFloat(item.price).toFixed(2)}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="badge ${badgeClass}">${statusText}</span>
                            <button class="btn-action ${actionClass}" onclick="toggleMenuAvailability('${item.id}', ${item.is_available === false})">${actionText}</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleTableAvailability(tableId, isAvailable) {
            try {
                const response = await fetch(`/api/restaurants/${currentRestaurantId}/tables/${tableId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_available: isAvailable })
                });
                if (response.ok) {
                    const table = tablesData.find(t => t.id === tableId);
                    if (table) {
                        table.is_available = isAvailable;
                        renderTables();
                    }
                }
            } catch (err) {
                console.error("Error toggling table state:", err);
            }
        }

        async function toggleMenuAvailability(itemId, isAvailable) {
            try {
                const response = await fetch(`/api/restaurants/${currentRestaurantId}/menu/${itemId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_available: isAvailable })
                });
                if (response.ok) {
                    const item = menuItemsData.find(mi => mi.id === itemId);
                    if (item) {
                        item.is_available = isAvailable;
                        renderMenuItems();
                    }
                }
            } catch (err) {
                console.error("Error toggling menu state:", err);
            }
        }

        async function addTable(event) {
            event.preventDefault();
            const numberInput = document.getElementById("new-table-number");
            const capacityInput = document.getElementById("new-table-capacity");
            
            const table_number = numberInput.value.trim();
            const capacity = parseInt(capacityInput.value);

            if (!table_number || isNaN(capacity)) {
                return;
            }

            try {
                const response = await fetch(`/api/restaurants/${currentRestaurantId}/tables`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ table_number, capacity })
                });
                if (response.ok) {
                    const newTable = await response.json();
                    tablesData.push(newTable);
                    renderTables();
                    numberInput.value = "";
                    capacityInput.value = "4";
                }
            } catch (err) {
                console.error("Error adding table:", err);
            }
        }

        async function addMenuItem(event) {
            event.preventDefault();
            const nameInput = document.getElementById("new-item-name");
            const priceInput = document.getElementById("new-item-price");
            
            const name = nameInput.value.trim();
            const price = parseFloat(priceInput.value);

            if (!name || isNaN(price)) {
                return;
            }

            try {
                const response = await fetch(`/api/restaurants/menu/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ restaurant_id: currentRestaurantId, name, price })
                });
                if (response.ok) {
                    const added = await response.json();
                    menuItemsData.push({ id: added.id, restaurant_id: currentRestaurantId, name, price, is_available: true });
                    renderMenuItems();
                    nameInput.value = "";
                    priceInput.value = "";
                }
            } catch (err) {
                console.error("Error adding food item:", err);
            }
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        async function fetchOrders(restaurantId) {
            try {
                const response = await fetch(`/api/restaurants/${restaurantId}/orders`);
                if (response.ok) {
                    const orders = await response.json();
                    renderOrders(orders);
                }
            } catch (err) {
                console.error("Error fetching orders:", err);
            }
        }

        async function updateOrderStatus(orderId, status) {
            try {
                const response = await fetch(`/api/orders/${orderId}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (response.ok) {
                    fetchOrders(currentRestaurantId);
                }
            } catch (err) {
                console.error("Error updating order status:", err);
            }
        }

        function renderOrders(ordersList) {
            const listElement = document.getElementById("orders-list");
            if (!listElement) return;

            // Filter orders by status
            const preparingOrders = ordersList.filter(o => o.order_status === 'PREPARING');
            const placedOrders = ordersList.filter(o => o.order_status === 'PLACED');
            const completedOrders = ordersList.filter(o => o.order_status === 'COMPLETED');

            activeOrdersCount = preparingOrders.length + placedOrders.length;
            document.getElementById("order-count-badge").textContent = `${activeOrdersCount} Active Preorders`;

            if (ordersList.length === 0) {
                listElement.innerHTML = `<p style="color: #94a3b8; text-align: center; margin: 30px 0; font-size: 14px; font-family: 'JetBrains Mono', monospace;">📡 Listening for dispatch signals. No active or scheduled orders in queue.</p>`;
                return;
            }

            let html = "";

            // 1. ACTIVE COOKING SECTION
            if (preparingOrders.length > 0) {
                html += `
                    <div style="margin-bottom: 25px;">
                        <h3 style="color: #ff4757; font-size: 15px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                            <span>🔥 Active Cooking (Live Fire)</span>
                            <span style="background: rgba(255, 71, 87, 0.2); color: #ff4757; padding: 2px 6px; border-radius: 4px; font-size: 11px;">${preparingOrders.length}</span>
                        </h3>
                        <div style="display: flex; flex-direction: column; gap: 12px;">
                `;

                preparingOrders.forEach(o => {
                    const itemsHtml = o.items && o.items.length > 0
                        ? o.items.map(item => `<div style="font-size: 13px; color: #f1f2f6; display: flex; justify-content: space-between; align-items: center;"><span>• ${escapeHtml(item.name)}</span> <span class="neon-qty">x${item.quantity}</span></div>`).join('')
                        : `<div style="font-size: 12px; color: #747d8c;">No items detailed</div>`;

                    const tableBadgeHtml = (o.fulfillment_type === 'DINE_IN' && o.reserved_table_number)
                        ? `<span style="background: rgba(59, 130, 246, 0.2); color: #60a5fa; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 8px; display: inline-flex; align-items: center; gap: 4px;">🪑 Table ${escapeHtml(o.reserved_table_number)}</span>`
                        : '';

                    html += `
                        <div class="order-card alert-active" style="display: flex; flex-direction: column; gap: 12px; padding: 15px; box-sizing: border-box; width: 100%;">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; width: 100%;">
                                <div>
                                    <strong style="color: white; font-size: 15px;">ORDER ID: #${o.id.substring(0,8)}</strong>
                                    <div style="font-size: 11px; color: #a4b0be; margin-top: 2px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px;">
                                        Fulfillment: <span style="color: #2ed573; font-weight: bold; text-transform: uppercase;">${o.fulfillment_type}</span>
                                        ${tableBadgeHtml}
                                    </div>
                                </div>
                                <div style="text-align: right;">
                                    <span style="font-weight: bold; color: #ffffff; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 6px; font-size: 14px;">$${parseFloat(o.total_amount).toFixed(2)}</span>
                                </div>
                            </div>
                            
                            <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; display: flex; flex-direction: column; gap: 4px;">
                                ${itemsHtml}
                            </div>

                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px; flex-wrap: wrap; gap: 10px; width: 100%;">
                                <span style="font-size: 12px; color: #ff4757; font-weight: bold; display: flex; align-items: center; gap: 4px;">
                                    ⏱️ Kitchen preparing now...
                                </span>
                                <button class="btn-action" style="background: #2ed573; color: #1e222b;" onclick="updateOrderStatus('${o.id}', 'COMPLETED')">Mark Ready / Fulfill</button>
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            // 2. SCHEDULED PREORDERS SECTION
            if (placedOrders.length > 0) {
                html += `
                    <div style="margin-bottom: 25px;">
                        <h3 style="color: #ffa502; font-size: 15px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                            <span>⏳ Scheduled Upcoming Preorders</span>
                            <span style="background: rgba(255, 165, 2, 0.2); color: #ffa502; padding: 2px 6px; border-radius: 4px; font-size: 11px;">${placedOrders.length}</span>
                        </h3>
                        <div style="display: flex; flex-direction: column; gap: 12px;">
                `;

                placedOrders.forEach(o => {
                    const itemsHtml = o.items && o.items.length > 0
                        ? o.items.map(item => `<div style="font-size: 13px; color: #f1f2f6; display: flex; justify-content: space-between; align-items: center;"><span>• ${escapeHtml(item.name)}</span> <span class="neon-qty">x${item.quantity}</span></div>`).join('')
                        : `<div style="font-size: 12px; color: #747d8c;">No items detailed</div>`;

                    const tableBadgeHtml = (o.fulfillment_type === 'DINE_IN' && o.reserved_table_number)
                        ? `<span style="background: rgba(59, 130, 246, 0.2); color: #60a5fa; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 8px; display: inline-flex; align-items: center; gap: 4px;">🪑 Table ${escapeHtml(o.reserved_table_number)}</span>`
                        : '';

                    const fireTime = new Date(o.scheduled_fire_time);
                    const fireTimeStr = fireTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    html += `
                        <div class="order-card" style="display: flex; flex-direction: column; gap: 12px; padding: 15px; box-sizing: border-box; width: 100%;">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; width: 100%;">
                                <div>
                                    <strong style="color: #ffffff; font-size: 14px;">ORDER ID: #${o.id.substring(0,8)}</strong>
                                    <div style="font-size: 11px; color: #a4b0be; margin-top: 2px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px;">
                                        Fulfillment: <span style="color: #a4b0be; font-weight: bold;">${o.fulfillment_type}</span>
                                        ${tableBadgeHtml}
                                    </div>
                                </div>
                                <div style="text-align: right;">
                                    <span style="font-weight: bold; color: #ffa502; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 6px; font-size: 13px;">$${parseFloat(o.total_amount).toFixed(2)}</span>
                                </div>
                            </div>
                            
                            <div style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 6px; display: flex; flex-direction: column; gap: 4px;">
                                ${itemsHtml}
                            </div>

                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px; flex-wrap: wrap; gap: 10px; width: 100%;">
                                <div style="font-size: 12px; color: #a4b0be;">
                                    ⏰ Auto-Cooks at: <strong style="color: #ffa502;">${fireTimeStr}</strong>
                                </div>
                                <button class="btn-action btn-secondary" onclick="updateOrderStatus('${o.id}', 'PREPARING')">🔥 Cook Now (Fire Early)</button>
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            // 3. RECENTLY COMPLETED SECTION
            if (completedOrders.length > 0) {
                const recentCompleted = completedOrders.slice(0, 5);
                html += `
                    <div>
                        <h3 style="color: #2ed573; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                            <span>✅ Recently Fulfilled / Handed Off</span>
                            <span style="background: rgba(46, 213, 115, 0.2); color: #2ed573; padding: 2px 6px; border-radius: 4px; font-size: 11px;">${recentCompleted.length}</span>
                        </h3>
                        <div style="display: flex; flex-direction: column; gap: 8px;">
                `;

                recentCompleted.forEach(o => {
                    const tableBadgeHtml = (o.fulfillment_type === 'DINE_IN' && o.reserved_table_number)
                        ? `<span style="background: rgba(59, 130, 246, 0.15); color: #60a5fa; padding: 1px 4px; border-radius: 3px; font-size: 10px; font-weight: bold; margin-left: 6px;">Table ${escapeHtml(o.reserved_table_number)}</span>`
                        : '';

                    html += `
                        <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(30, 34, 43, 0.5); padding: 10px 15px; border-radius: 6px; border-left: 3px solid #2ed573; font-size: 13px; box-sizing: border-box; width: 100%; border: 1px solid #1e293b;">
                            <div>
                                <span style="font-weight: bold; color: #a4b0be;">#${o.id.substring(0,8)}</span>
                                <span style="color: #747d8c; margin-left: 8px;">${o.fulfillment_type}${tableBadgeHtml}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="color: #2ed573; font-weight: bold;">$${parseFloat(o.total_amount).toFixed(2)}</span>
                                <span style="font-size: 11px; color: #a4b0be;">Ready / Picked Up</span>
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            listElement.innerHTML = html;
        }

        // Initialize connection & controls
        if (typeof io !== 'undefined') {
            socket = io(window.location.origin, { transports: ['websocket'] });        

            function joinRoom(restaurantId) {
                console.log("Joining channel room:", restaurantId);
                socket.emit("join_restaurant_room", restaurantId);
                document.getElementById("orders-list").innerHTML = `<p style="color: #a4b0be; text-align: center; margin: 20px 0; font-size: 13px;">📡 Listening for dispatch signals. Live stream is active...</p>`;
                activeOrdersCount = 0;
                document.getElementById("order-count-badge").textContent = "0 Active Signals";
                fetchOrders(restaurantId);
            }

            socket.on("connect", () => {
                joinRoom(currentRestaurantId);
            });

            document.getElementById("restaurant-selector").addEventListener("change", (e) => {
                currentRestaurantId = e.target.value;
                joinRoom(currentRestaurantId);
                
                // If not logged in, we fetch tables/menu items for whatever restaurant they selected to preview
                if (!loggedInRestId) {
                    showManagementPanel(false);
                }
            });

            // Listen for any order-related real-time updates to trigger visual list refreshes
            socket.on("NEW_KITCHEN_FIRE_ORDER", (data) => {
                fetchOrders(currentRestaurantId);
            });

            socket.on("ORDER_PLACED", (data) => {
                fetchOrders(currentRestaurantId);
            });

            socket.on("ORDER_STATUS_CHANGED", (data) => {
                fetchOrders(currentRestaurantId);
            });

            socket.on("ORDER_FULFILLED", (data) => {
                fetchOrders(currentRestaurantId);
            });

            socket.on("TABLE_STATUS_CHANGED", (data) => {
                // If this is the active restaurant, reload tables/orders view in real-time
                fetchOrders(currentRestaurantId);
                if (loggedInRestId) {
                    fetchTables(currentRestaurantId);
                }
            });

            socket.on("EMERGENCY_HOLD_ALERT", (data) => {
                fetchOrders(currentRestaurantId);
                alert(`⚠️ EMERGENCY HOLD ALERT:\n${data.message}`);
            });
        } else {
            console.error("Socket.io client library could not be resolved.");
            document.getElementById("orders-list").innerHTML = `
                <div style="background-color: #ff4757; color: white; padding: 20px; border-radius: 8px; font-weight: bold; margin-top: 10px;">
                    ⚠️ Socket.io Error: Live sync is temporarily unavailable. 
                    <p style="font-weight: normal; margin-top: 5px; font-size: 14px;">The Socket.io library did not load correctly. Please make sure the backend Express application is fully running on port 3000 and reload the page.</p>
                </div>
            `;
        }

        // Initialize page state
        updateAuthBanner();
    </script>
</body>
</html>
